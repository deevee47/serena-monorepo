name: Python CI

on:
  push:
    paths:
      - 'fastapi-brain/**'
      - 'shared/**'
  pull_request:
    paths:
      - 'fastapi-brain/**'
      - 'shared/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fastapi-brain
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv virtual environment
        uses: actions/cache@v4
        with:
          path: fastapi-brain/.venv
          key: ${{ runner.os }}-uv-${{ hashFiles('fastapi-brain/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: uv run ruff check app/ tests/

      - name: Type check with mypy
        run: uv run mypy app/

      - name: Test with pytest
        run: uv run pytest --cov=app tests/
